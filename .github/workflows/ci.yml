name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-mock
          # Install our requirements (excluding Windows-only)
          cat requirements.txt | grep -v pywin32 | grep -v winsound >> req_clean.txt
          pip install -r req_clean.txt || true

      - name: Run pytest
        env:
          PYTHONPATH: .
        run: |
          pytest -v tests/

  lua-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Lua and Luacheck
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1 luarocks
          sudo luarocks install luacheck

      - name: Lint Lua
        run: |
          luacheck MantellaWoW/

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install mypy
        run: |
          pip install mypy
          pip install types-mock

      - name: Type check
        run: |
          mypy game_interfaces/ --ignore-missing-imports
