name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. v0.1.0)'
        required: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version
        id: version
        run: |
          VERSION=${{ github.event.release.tag_name || github.event.inputs.version }}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "zip_name=pantella-wow-${VERSION}.zip" >> $GITHUB_OUTPUT

      - name: Build release zip
        run: |
          # Single zip containing both the WoW addon and the Pantella plugin.
          # Structure mirrors exactly what the user needs to copy:
          #   MantellaWoW/           -> WoW/Interface/AddOns/
          #   game_interfaces/wow.py -> <Pantella>/game_interfaces/
          #   interface_configs/     -> <Pantella>/interface_configs/
          #   character_db/          -> <Pantella>/character_db/
          mkdir -p staging/MantellaWoW
          mkdir -p staging/game_interfaces
          mkdir -p staging/interface_configs
          mkdir -p staging/character_db

          cp -r MantellaWoW/. staging/MantellaWoW/
          cp game_interfaces/wow.py staging/game_interfaces/
          cp -r interface_configs/. staging/interface_configs/
          cp -r character_db/. staging/character_db/
          cp metadata.json staging/
          cp README.md staging/

          cd staging
          zip -r ../${{ steps.version.outputs.zip_name }} .
          cd ..

          echo "=== Zip contents ==="
          unzip -l ${{ steps.version.outputs.zip_name }}

      # ------------------------------------------------------------------ #
      # STEP 1 — Attach zip to the GitHub Release
      # ------------------------------------------------------------------ #
      - name: Attach zip to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.version.outputs.zip_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------------ #
      # STEP 2 — Upload full zip (addon + plugin) to Nexus Mods
      # ------------------------------------------------------------------ #
      - name: Upload to Nexus Mods
        uses: Nexus-Mods/upload-action@main
        with:
          api_key: ${{ secrets.NEXUSMODS_API_KEY }}
          file_id: ${{ vars.NEXUSMODS_FILE_ID }}
          filename: ${{ steps.version.outputs.zip_name }}
          display_name: "Pantella WoW ${{ steps.version.outputs.version }}"
          description: |
            World of Warcraft integration for the Mantella/Pantella AI NPC framework.
            One zip contains everything: the WoW addon (MantellaWoW/) and the Pantella plugin (game_interfaces/wow.py).
            Full install instructions and changelog: https://github.com/niStee/pantella-wow/releases/tag/${{ steps.version.outputs.version }}
          version: ${{ steps.version.outputs.version }}

      # ------------------------------------------------------------------ #
      # STEP 3 — CurseForge (DISABLED — uncomment when ready for broader
      #           WoW audience discovery. Also requires:
      #             - Secret:   CURSEFORGE_TOKEN
      #             - Variable: CURSEFORGE_PROJECT_ID
      #           The zip uploaded here contains ONLY MantellaWoW/ (the Lua
      #           addon). It links back to Nexus for the full install.
      # ------------------------------------------------------------------ #
      # - name: Build CurseForge addon-only zip
      #   run: |
      #     cd MantellaWoW
      #     zip -r ../MantellaWoW-${{ steps.version.outputs.version }}.zip .
