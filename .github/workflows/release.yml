      #   uses: itsmeow/curseforge-upload@v3
      #   with:
      #     token: ${{ secrets.CURSEFORGE_TOKEN }}
      #     project_id: ${{ vars.CURSEFORGE_PROJECT_ID }}
      #     game_endpoint: wow
      #     file_path: MantellaWoW-${{ steps.version.outputs.version }}.zip
      #     display_name: "MantellaWoW ${{ steps.version.outputs.version }}"
      #     game_versions: "Retail"
